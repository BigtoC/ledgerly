name: GitHub Pages

on:
  push:
    branches: [main]
  workflow_run:
    workflows: ['Android release']
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'

      - name: Enable Corepack
        run: |
          corepack enable
          corepack prepare yarn@4.13.0 --activate

      - name: Cache Yarn artifacts
        uses: actions/cache@v5
        with:
          path: |
            ~/.yarn/berry/cache
            ~/.cache/yarn
            site/.yarn/install-state.gz
          key: ${{ runner.os }}-site-yarn-${{ hashFiles('site/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-site-yarn-

      - name: Build site with Astro action
        uses: withastro/action@b7d53628f8b666036b0238aadb0b984a2a489f26 # v6.1.1
        with:
          path: ./site

  deploy:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
