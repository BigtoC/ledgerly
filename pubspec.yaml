name: ledgerly
description: Local-first Flutter expense tracker. See PRD.md for the spec.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ^3.11.5
  flutter: ">=3.41.6"

# Dependency list mirrors PRD.md -> Dependencies -> Core (MVP) exactly.
# Phase 2 packages (dio, flutter_secure_storage, fl_chart, ...) are NOT
# added here; they land with their corresponding milestone.
dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # App shell / state
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Local database
  drift: ^2.28.0
  drift_flutter: ^0.2.7
  path_provider: ^2.1.5

  # Navigation
  go_router: ^17.2.1

  # Domain modelling
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0

  # i18n
  intl: ^0.20.2

  # UI components
  flutter_slidable: ^4.0.3
  material_symbols_icons: ^4.2803.0

  # App info
  package_info_plus: ^8.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Code generation runners
  build_runner: ^2.5.4
  drift_dev: ^2.28.0
  freezed: ^3.1.0
  json_serializable: ^6.9.0
  riverpod_generator: ^2.6.3

  # Linting / static analysis
  flutter_lints: ^6.0.0
  custom_lint: ^0.7.6
  riverpod_lint: ^2.6.5
  import_lint: ^0.1.6

  # Testing
  fake_async: ^1.3.3
  mocktail: ^1.0.4

  # Native splash is a codegen CLI (`dart run flutter_native_splash:create`),
  # never imported at runtime, so it belongs in dev_dependencies even though
  # PRD lists it under Core (MVP).
  flutter_native_splash: ^2.4.4

flutter:
  uses-material-design: true
  generate: true
  assets:
    # Splash slice (M5 Wave 1). Real sun-themed asset drops in during M6
    # native-splash regeneration per implementation-plan.md → M6. Until
    # then the directory only carries the README placeholder and the
    # splash widgets fall back to a procedural gradient that matches
    # the final visual direction (see widgets/splash_sun_background.dart).
    - assets/splash/

# Placeholder themed native splash per M0 plan; assets are regenerated in
# M6 once the final sun-themed asset ships.
flutter_native_splash:
  color: "#FFFFFF"
  color_dark: "#121212"
  android_12:
    color: "#FFFFFF"
    color_dark: "#121212"
  android: true
  ios: true
  web: false
