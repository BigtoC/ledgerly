name: ledgerly
description: Local-first Flutter expense tracker. See PRD.md for the spec.
publish_to: "none"
version: 0.3.1

environment:
  sdk: ^3.11.5
  flutter: ">=3.41.6"

# Dependency list mirrors PRD.md -> Dependencies -> Core (MVP) exactly.
# Phase 2 packages (dio, flutter_secure_storage, fl_chart, ...) are NOT
# added here; they land with their corresponding milestone.
dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # App shell / state
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Local database
  drift: ^2.28.0
  drift_flutter: ^0.2.7
  path_provider: ^2.1.5

  # Navigation
  go_router: ^17.2.2

  # Domain modelling
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0

  # i18n
  intl: ^0.20.2

  # UI components
  flutter_slidable: ^4.0.3
  material_symbols_icons: ^4.2803.0

  # App info
  package_info_plus: ^8.3.0

  # In-app browser
  webview_flutter: ^4.13.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Code generation runners
  build_runner: ^2.5.4
  drift_dev: ^2.28.0
  freezed: ^3.1.0
  json_serializable: ^6.9.0
  riverpod_generator: ^2.6.3

  # Linting / static analysis
  flutter_lints: ^6.0.0
  custom_lint: ^0.7.6
  riverpod_lint: ^2.6.5
  import_lint: ^0.1.6

  # Testing
  fake_async: ^1.3.3
  mocktail: ^1.0.4

  # Native splash is a codegen CLI (`dart run flutter_native_splash:create`),
  # never imported at runtime, so it belongs in dev_dependencies even though
  # PRD lists it under Core (MVP).
  flutter_native_splash: ^2.4.4

flutter:
  uses-material-design: true
  generate: true
  assets:
    # Splash slice assets. `sun-splash.png` now backs both the runtime
    # Flutter splash and the native splash regeneration step.
    - assets/splash/

# Native splash config. `background_image` is supported on iOS and
# pre-Android-12. Android 12+ only supports a solid background plus a
# centered splash image, so that section keeps explicit fallback colors.
flutter_native_splash:
  background_image_android: assets/splash/sun-splash.png
  background_image_dark_android: assets/splash/sun-splash.png
  background_image_ios: assets/splash/sun-splash.png
  background_image_dark_ios: assets/splash/sun-splash.png
  fullscreen: true
  android_12:
    color: "#D9A06C"
    color_dark: "#2B1828"
  android: true
  ios: true
  web: false
